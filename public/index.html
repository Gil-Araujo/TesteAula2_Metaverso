<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <title>Aula 2 - Metaverso VR Medicina</title>

    <!-- Importmap: single THREE instance shared by A-Frame + Spark.js -->
    <script type="importmap">
    {
      "imports": {
        "aframe": "https://aframe.io/releases/1.7.1/aframe.module.min.js",
        "three": "https://cdn.jsdelivr.net/npm/super-three@0.173.4/build/three.module.js",
        "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/0.1.10/spark.module.js"
      }
    }
    </script>

    <script type="module">
      // =====================================================
      //  BOOT SEQUENCE
      //  A-Frame async → Spark.js → Socket.IO → EasyRTC →
      //  NAF 0.14 → Event-Set → register components → go
      // =====================================================

      // Prevent A-Frame from auto-starting before everything is ready
      window.AFRAME_ASYNC = true;

      // 1. Load A-Frame (sets window.AFRAME globally)
      await import("aframe");

      // 2. Load Spark.js (Gaussian Splat renderer)
      const { SplatMesh, SparkRenderer } = await import("@sparkjsdev/spark");

      // 3. Helper: load a classic <script> dynamically
      function loadScript(src) {
        return new Promise((resolve, reject) => {
          const s = document.createElement("script");
          s.src = src;
          s.onload = resolve;
          s.onerror = reject;
          document.head.appendChild(s);
        });
      }

      // 4. Socket.IO + EasyRTC (with UMD module workaround)
      const __savedModule = window.module;
      window.module = undefined;
      await loadScript("/socket.io/socket.io.js");
      await loadScript("/easyrtc/easyrtc.js");
      window.module = __savedModule;

      // 5. Networked A-Frame (multiplayer)
      await loadScript(
        "https://cdn.jsdelivr.net/gh/networked-aframe/networked-aframe@0.14.0/dist/networked-aframe.min.js"
      );

      // 6. Event-Set component (declarative interactions)
      await loadScript(
        "https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"
      );

      // =====================================================
      //  CUSTOM COMPONENTS
      // =====================================================

      // --- Random avatar color ---
      const AVATAR_COLORS = [
        "#E74C3C", "#3498DB", "#2ECC71", "#F39C12",
        "#9B59B6", "#1ABC9C", "#E67E22", "#FF6B9D"
      ];

      AFRAME.registerComponent("random-color", {
        init: function () {
          const color = AVATAR_COLORS[Math.floor(Math.random() * AVATAR_COLORS.length)];
          this.el.setAttribute("material", "color", color);
        }
      });

      // --- Billboard: text always faces the camera ---
      AFRAME.registerComponent("billboard", {
        tick: function () {
          const camera = this.el.sceneEl.camera;
          if (camera) {
            this.el.object3D.lookAt(camera.getWorldPosition(new THREE.Vector3()));
          }
        }
      });

      // --- Shared color on click (synced to all players) ---
      AFRAME.registerComponent("shared-color", {
        init: function () {
          const colors = ["#4CC3D9", "#9B59B6", "#00FFFF", "#FF6B6B", "#FFD700", "#2ECC71", "#E74C3C"];
          let index = 0;
          const el = this.el;

          el.addEventListener("click", function () {
            index = (index + 1) % colors.length;
            el.setAttribute("material", "color", colors[index]);
            if (NAF.connection && NAF.connection.isConnected()) {
              NAF.utils.getNetworkedEntity(el).then(function (networkedEl) {
                NAF.utils.takeOwnership(networkedEl);
              }).catch(function () {});
            }
          });
        }
      });

      // --- Spark.js Gaussian Splat renderer ---
      let _sparkRenderer = null;

      AFRAME.registerComponent("spark-splat", {
        schema: {
          url:   { type: "string" },
          scale: { type: "number", default: 1.0 }
        },

        init() {
          const sceneEl = this.el.sceneEl;
          const data    = this.data;
          const el      = this.el;

          const setupSplat = () => {
            // SparkRenderer singleton — one per scene
            if (!_sparkRenderer) {
              _sparkRenderer = new SparkRenderer({ renderer: sceneEl.renderer });
              sceneEl.object3D.add(_sparkRenderer);
            }

            // Create the splat mesh (no re-encoding, no quality loss)
            const splat = new SplatMesh({ url: data.url });
            splat.scale.setScalar(data.scale);
            el.object3D.add(splat);
          };

          if (sceneEl.hasLoaded) {
            setupSplat();
          } else {
            sceneEl.addEventListener("loaded", setupSplat);
          }
        }
      });

      // =====================================================
      //  NAF SCHEMAS (data registration — no DOM dependency)
      // =====================================================

      NAF.schemas.add({
        template: "#avatar-template",
        components: [
          "position",
          "rotation",
          {
            selector: ".head",
            component: "material",
            property: "color"
          }
        ]
      });

      NAF.schemas.add({
        template: "#shared-box-template",
        components: [
          "position",
          "rotation",
          {
            component: "material",
            property: "color"
          }
        ]
      });

      NAF.schemas.add({
        template: "#shared-sphere-template",
        components: [
          "position",
          {
            component: "material",
            property: "color"
          }
        ]
      });

      // =====================================================
      //  ALL READY — start A-Frame
      // =====================================================
      console.log("A-Frame", AFRAME.version, "| Spark.js loaded | NAF loaded");
      AFRAME.emitReady();
    </script>

    <style>
      #overlay {
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 9999;
        background: rgba(0, 0, 0, 0.8);
        color: white;
        padding: 16px 22px;
        border-radius: 12px;
        font-family: Arial, sans-serif;
        font-size: 14px;
        max-width: 360px;
        line-height: 1.6;
        pointer-events: none;
      }
      #overlay h3 { margin: 0 0 8px 0; font-size: 17px; }
      #overlay ul { margin: 0; padding-left: 18px; }
      #overlay li { margin-bottom: 5px; }
      #overlay .highlight { color: #FFD700; font-weight: bold; }
    </style>
  </head>

  <body>
    <!-- ================================================ -->
    <!--         OVERLAY — instruções no ecrã             -->
    <!-- ================================================ -->
    <div id="overlay">
      <h3>Metaverso VR — Medicina</h3>
      <ul>
        <li><b>Mover:</b> W A S D &nbsp;|&nbsp; <b>Olhar:</b> arrastar rato</li>
        <li><b>Interagir:</b> aponta + clica (PC) ou espera 1.5s (VR)</li>
        <li class="highlight">As esferas coloridas são os outros alunos!</li>
        <li>Clica nos cubos/esfera — TODOS veem a mudança</li>
        <li>Coração: aponta para ver "Heart"</li>
      </ul>
    </div>

    <!-- ================================================ -->
    <!--              CENA MULTIPLAYER                    -->
    <!-- ================================================ -->
    <a-scene
      networked-scene="
        room: aula-medicina;
        adapter: easyrtc;
        connectOnLoad: true;
        debug: false;
      "
    >
      <!-- ============================================ -->
      <!--     ASSETS + TEMPLATES MULTIPLAYER           -->
      <!-- ============================================ -->
      <a-assets>
        <!-- === TEMPLATE DO AVATAR === -->
        <template id="avatar-template">
          <a-entity class="avatar">
            <a-sphere
              class="head"
              position="0 1.3 0"
              scale="0.35 0.35 0.35"
              material="flatShading: true"
              random-color
            ></a-sphere>
            <a-entity
              text="value: Aluno; align: center; color: white; width: 3"
              position="0 1.8 0"
              billboard
            ></a-entity>
          </a-entity>
        </template>

        <!-- === TEMPLATE CUBO PARTILHADO === -->
        <template id="shared-box-template">
          <a-entity
            geometry="primitive: box; width: 1.2; height: 1.2; depth: 1.2"
            material="color: #4CC3D9"
            class="clickable"
            shared-color
          ></a-entity>
        </template>

        <!-- === TEMPLATE ESFERA PARTILHADA === -->
        <template id="shared-sphere-template">
          <a-entity
            geometry="primitive: sphere; radius: 0.8"
            material="color: #EF2D5E"
            class="clickable"
            shared-color
          ></a-entity>
        </template>

        <!-- === HEART MODEL === -->
        <a-asset-item id="heart-obj" src="assets/heart/HumanHeart_OBJ.obj"></a-asset-item>
        <a-asset-item id="heart-mtl" src="assets/heart/HumanHeart_OBJ.mtl"></a-asset-item>
      </a-assets>

      <!-- ============================================ -->
      <!--   GAUSSIAN SPLAT ENVIRONMENT (World Labs)    -->
      <!--   Rendered natively — no quality loss        -->
      <!-- ============================================ -->
      <a-entity
        spark-splat="url: assets/scene/retro-futuristic-biomedical-space-chamber.spz; scale: 1.0"
        position="0 1.3 0"
      ></a-entity>

      <!-- ============================================ -->
      <!--              LIGHTING                        -->
      <!--  Reduced — splat has baked lighting.         -->
      <!--  Low ambient keeps A-Frame objects visible.  -->
      <!-- ============================================ -->
      <a-entity light="type: ambient; intensity: 0.4"></a-entity>
      <a-entity light="type: directional; intensity: 0.6" position="2 4 1"></a-entity>

      <!-- ============================================ -->
      <!--    OBJETOS PARTILHADOS (MULTIPLAYER)         -->
      <!--    Clicar muda a cor para TODOS os alunos    -->
      <!-- ============================================ -->

      <!-- Cubo partilhado — esquerda -->
      <a-entity
        networked="template:#shared-box-template; persistent:true; networkId:cubo-esq; owner:scene"
        position="-4 0.6 -5"
        rotation="0 30 0"
      ></a-entity>

      <!-- Cubo partilhado — direita -->
      <a-entity
        networked="template:#shared-box-template; persistent:true; networkId:cubo-dir; owner:scene"
        position="4 0.6 -5"
        rotation="0 -30 0"
      ></a-entity>

      <!-- Esfera partilhada — centro-atrás -->
      <a-entity
        networked="template:#shared-sphere-template; persistent:true; networkId:esfera-part; owner:scene"
        position="0 0.8 -7"
      ></a-entity>

      <!-- ============================================ -->
      <!--          CORAÇÃO 3D + LABEL                  -->
      <!-- ============================================ -->

      <!-- Label "Heart" — aparece ao apontar -->
      <a-entity
        id="heart-label"
        text="value: Heart; align: center; color: #FFFFFF; width: 4"
        position="0 2.2 -3"
        visible="false"
        billboard
      ></a-entity>

      <!-- Coração 3D — rotação contínua + label ao hover -->
      <a-entity
        id="heart"
        class="clickable"
        obj-model="obj: #heart-obj; mtl: #heart-mtl"
        material="side: double"
        position="0 1.2 -3"
        rotation="0 180 0"
        scale="0.08 0.08 0.08"
        animation="property: rotation; to: 0 540 0;
                   loop: true; dur: 12000; easing: linear"
        event-set__enter="_event: mouseenter; _target: #heart-label; visible: true"
        event-set__leave="_event: mouseleave; _target: #heart-label; visible: false"
      ></a-entity>

      <!-- ============================================ -->
      <!--    JOGADOR — "Camera Rig" (suporte de câmara)-->
      <!-- ============================================ -->
      <!-- Jogador — Camera Rig (duas camadas).
           Camada exterior ("rig"): fica no chão (y=0), move com WASD.
           Camada interior ("player"): câmara a y=1.6 (altura dos olhos). -->
      <a-entity
        id="rig"
        networked="template:#avatar-template; attachTemplateToLocal:false"
        wasd-controls
        position="0 0 0"
      >
        <a-entity
          id="player"
          camera
          look-controls
          position="0 1.6 0"
        >
          <!-- Retículo (cursor) — o pontinho branco no
               centro do ecrã. Serve para apontar e clicar.
               "fuse: true" = nos óculos VR, basta olhar
               fixamente 1.5 segundos para "clicar". -->
          <a-entity
            cursor="fuse: true; fuseTimeout: 1500"
            raycaster="objects: .clickable"
            position="0 0 -1"
            geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.02"
            material="color: #FFFFFF; shader: flat; transparent: true; opacity: 0.8"
            animation__fusing="property: scale; from: 1 1 1; to: 0.5 0.5 0.5;
                               dur: 1500; startEvents: fusing;
                               easing: easeInCubic"
            animation__reset="property: scale; to: 1 1 1;
                              dur: 200; startEvents: mouseleave"
          ></a-entity>
        </a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
